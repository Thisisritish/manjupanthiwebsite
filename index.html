<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Quotes That Will Change Your Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-gold: #d4af37;
            --accent-gold-light: #e6c875;
            --transition: all 0.4s ease;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 20%);
            transition: var(--transition);
        }

        .container {
            max-width: 800px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .quote-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 3.5rem 3rem;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
            width: 100%;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .quote-container::before {
            content: """;
            position: absolute;
            top: -30px;
            left: 15px;
            font-size: 15rem;
            font-family: 'Playfair Display', serif;
            color: rgba(212, 175, 55, 0.08);
            line-height: 1;
            z-index: 0;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 1rem;
            transition: var(--transition);
        }

        .quote-author {
            font-style: italic;
            color: var(--accent-gold-light);
            font-size: 1.3rem;
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 0 1rem;
        }

        .navigation {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--text-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            background: var(--accent-gold);
            color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .random-btn {
            background: rgba(212, 175, 55, 0.15);
        }

        .random-btn:hover {
            background: var(--accent-gold);
            color: #1e293b;
        }

        .counter {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 1.5rem;
            position: relative;
            z-index: 2;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }

        footer a {
            color: var(--accent-gold);
            text-decoration: none;
            transition: var(--transition);
        }

        footer a:hover {
            text-decoration: underline;
        }

        .fade-in {
            animation: fadeIn 0.8s ease;
        }

        .fade-out {
            animation: fadeOut 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .quote-mark {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 5rem;
            font-family: 'Playfair Display', serif;
            color: rgba(212, 175, 55, 0.1);
            line-height: 1;
            transform: rotate(180deg);
        }

        @media (max-width: 768px) {
            .quote-text {
                font-size: 1.8rem;
                padding: 0 0.5rem;
            }
            
            .quote-author {
                font-size: 1.1rem;
            }
            
            .quote-container {
                padding: 2.5rem 2rem;
            }
            
            .nav-btn {
                padding: 0.7rem 1.2rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .quote-text {
                font-size: 1.5rem;
            }
            
            .quote-container::before {
                font-size: 10rem;
                top: -20px;
            }
            
            .quote-mark {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quote-container">
            <div class="quote-mark">"</div>
            <div id="quote-text" class="quote-text fade-in">Loading...</div>
            <div id="quote-author" class="quote-author"></div>
            
            <div class="counter">
                <span id="current-index">1</span> of <span id="total-quotes">100</span>
            </div>
            
            <div class="navigation">
                <button class="nav-btn" id="prev-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Previous
                </button>
                <button class="nav-btn random-btn" id="random-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v8"></path>
                        <path d="M8 12h8"></path>
                    </svg>
                    Random
                </button>
                <button class="nav-btn" id="next-btn">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>
        
        <footer>
            <p>100 Quotes That Will Change Your Life &copy; <span id="current-year"></span> | Library Mindset</p>
        </footer>
    </div>

    <script>
        // Array of all quotes from the PDF
        const quotes = [
            { text: "Some people die at 25 and aren't buried until 75.", author: "Benjamin Franklin" },
            { text: "If your only goal is to become rich, you will never achieve it.", author: "John D. Rockfeller Sr." },

            { text: "People do not decide their futures, they decide their habits and their habits decide their futures.", author: "F.M. Alexander" },
            { text: "Never put too much trust in friends, learn how to use enemies.", author: "Robert Greene" },
            { text: "Only staying active will make you want to live a hundred years.", author: "Japanese Proverb" },
            { text: "You are what you eat and read.", author: "Maya Corrigan" },
            { text: "Fall in love with taking care of yourself. Fall in love with becoming the best version of yourself but with patience, with compassion and respect to your own journey.", author: "S. Mcnutt" },
            { text: "The first step toward getting somewhere is to decide that you are not going to stay where you are.", author: "J.P. Morgan" },
            { text: "The single most powerful asset we all have is our mind. If it is trained well, it can create enormous wealth.", author: "Robert T. Kiyosaki" },
            { text: "Learn to choose your mental health over old attachments.", author: "Hana Shebar" },
            { text: "If it isn't a clear yes, then it's a clear no.", author: "Greg McKeown" },
            { text: "Procrastination will delay your dreams.", author: "Vex King" },
            { text: "Reading an hour a day is only 4% of your day. But that 4% will put you at the top of your field within 10 years. Find the time.", author: "Patrick Bet-David" },
            { text: "May God have mercy upon my enemies, because I won't.", author: "George S. Patton" },
            { text: "Surround yourself only with people who are going to lift you higher.", author: "Oprah Winfrey" },
            { text: "If you cannot decide, the answer is no.", author: "Naval Ravikant" },
            { text: "You'll never find a rainbow if you're looking down.", author: "Charlie Chaplin" },
            { text: "Always say less than neccessary.", author: "Robert Greene" },
            { text: "It always seems impossible, until it is done.", author: "Nelson Mandela" },
            { text: "Remember, some of the best times of your life haven't even happened yet.", author: "Doug Carwright" },
            { text: "A ship is safe in harbor, but that's not what ships are built for.", author: "John A. Shedd" },
            { text: "When a person can't find a deep sense of meaning, they distract themselves with pleasure.", author: "Victor Frankl" },
            { text: "A man who fears suffering is already suffering from what he fears.", author: "Montaigne" },
            { text: "We work jobs we hate, to buy things we don't need, to impress people we don't like.", author: "Tyler Durden" },
            { text: "Your time is limited so don't waste it living someone else's life.", author: "Steve Jobs" },
            { text: "A friend to all is a friend to none.", author: "Aristotle" },
            { text: "By changing nothing, nothing changes.", author: "Tony Robbins" },
            { text: "If you're serious about changing your life, you'll find a way. If not you'll find an excuse.", author: "Jen Sincero" },
            { text: "Your life does not get better by chance, it gets better by change.", author: "Jim Rohn" },
            { text: "Change is hard at first, messy in the middle and gorgeous at the end.", author: "Robin Sharma" },
            { text: "You will face many defeats in life but never let yourself be defeated.", author: "Maya Angelou" },
            { text: "If you want a new idea, read an old book.", author: "Ivan Pavlov" },
            { text: "If you can change your mind, you can change your life.", author: "William James" },
            { text: "If people are not laughing at your goals, your goals are too small.", author: "Azim Premji" },
            { text: "If you are lonely when you're alone you are in a bad company.", author: "Jean Paul Sartre" },
            { text: "We suffer more in imagination than in reality.", author: "Seneca" },
            { text: "When you have something to say, silence is a lie.", author: "Jordan B. Peterson" },
            { text: "The oldest, shortest words - 'yes' and 'no'- are those which requires the most thought.", author: "Pythagoras" },
            { text: "In life, the only two things you can control are your effort and your attitude. Everything else is not up to you.", author: "S. Mcnutt" },
            { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
            { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
            { text: "If you live each day as if it were your last, someday you'll be right.", author: "Steve Jobs" },
            { text: "Don't judge each day by the harvest you reap but by the seeds that you plant.", author: "Robert Louis Stevenson" },
            { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
            { text: "The best revenge is not to be like your enemy.", author: "Marcus Aurelius" },
            { text: "Everyone must choose one of two pains: The pain of discipline or the pain of regret.", author: "Jim Rohn" },
            { text: "Never spend money before you have it.", author: "Thomas Jefferson" },
            { text: "The poor and the middle class work for money. The rich have money work for them.", author: "Robert T. Kiyosaki" },
            { text: "He who has a why to live for can bear with almost any how.", author: "Friedrich Nietzsche" },
            { text: "I'd rather be optimistic and wrong than pessimistic and right.", author: "Elon Musk" },
            { text: "Everyone thinks of changing the world but no one thinks of changing himself.", author: "Leo Tolstoy" },
            { text: "One day you will wake up and there won't be any more time to do things you've always wanted. Do it now.", author: "Paulo Coelho" },
            { text: "You should examine yourself daily. If you find faults, you should correct them. When you find none, you should try even harder.", author: "Israel Zangwill" },
            { text: "If you set your goals ridiculously high and it's a failure, you will fail above everyone else's success.", author: "James Cameron" },
            { text: "Travel and tell no one, live a true love story and tell no one, live happily and tell no one, people ruin beautiful things.", author: "Kahlil Gibran" },
            { text: "The nearer a man comes to a calm mind, the closer he is to strength.", author: "Marcus Aurelius" },
            { text: "The first principle is that you must not fool yourself and you are the easiest person to fool.", author: "Richard Feynman" },
            { text: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
            { text: "Step out of your comfort zone and face your fears. Growth takes place when you are challenged, not when you are comfortable.", author: "Vex King" },
            { text: "Be so good that they can't ignore you.", author: "Steve Martin" },
            { text: "Who chases two rabbits catches neither.", author: "Japanese Proverb" },
            { text: "When you focus on you, you grow. When you focus on shit, shit grows.", author: "Unknown" },
            { text: "The journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
            { text: "A little impatience will spoil great plans.", author: "Chinese Proverb" },
            { text: "You've made mistakes in the past, you will probably make more in future. And that's ok.", author: "Hanna Shebar" },
            { text: "When something is important enough, you do it even if the odds are not in your favor.", author: "Elon Musk" },
            { text: "A good plan, violently executed now, is better than a perfect plan next week.", author: "George S. Patton" },
            { text: "Good habits formed at youth make all the difference.", author: "Aristotle" },
            { text: "If you want to conquer fear, don't sit home and think about it. Go out and get busy.", author: "Dale Carnegie" },
            { text: "A problem is a chance for you to do your best.", author: "Duke Ellington" },
            { text: "A fit body, a calm mind, a house full of love. These things cannot be bought- they must be earned.", author: "Naval Ravikant" },
            { text: "No mortal man, is wise at all moments.", author: "Pliny The Elder" },
            { text: "If a man knows not to which port he sails, no wind is favorable.", author: "Seneca" },
            { text: "Life will not postpone our death. So, let us not postpone our life", author: "Unknown" },
            { text: "Win through your actions, never through argument.", author: "Robert Greene" },
            { text: "Motivation is what gets you started. Habit is what keeps you going.", author: "Jim Rohn" },
            { text: "Learn from the mistakes of others... you can't live long enough to make them all yourselves.", author: "Chanakya" },
            { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela" },
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "He will never have true friends who is afraid of making enemies.", author: "William Hazlitt" },
            { text: "A man who is a master of patience is master of everything else.", author: "George Savile" },
            { text: "Inaction breeds doubt and fear. Action breeds confidence and courage.", author: "Dale Carnegie" },
            { text: "No man ever steps in the same river twice, for it's not the same river and he's not the same man.", author: "Heraclitus" },
            { text: "Don't let yourself be controlled by three things: people, money, or past experience.", author: "Unknown" },
            { text: "Do what is right, not what is easy nor what is popular.", author: "Roy T. Bennett" },
            { text: "The goal is not to be better than the other man, but your previous self.", author: "Dalai Lama" },
            { text: "The future depends on what you do.", author: "Mahatma Gandhi" },
            { text: "We have two ears and one mouth, so we should listen more than we say.", author: "Zeno" },
            { text: "The bigger the 'why' the easier the 'how'.", author: "Jim Rohn" },
            { text: "The only man who never makes mistakes is the man who never does anything.", author: "Theodre Roosevelt" },
            { text: "We're what we repeatedly do. Excellence, therefore, is not an act, but a habit.", author: "Aristotle" },
            { text: "If you quit once it becomes a habit. Never quit!", author: "Michael Jordan" },
            { text: "When a person dies, he leaves his belongings at home, his family at the graveside and the only thing that accompanies him are his deeds.", author: "Unknown" },
            { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aureilius" },
            { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi" },
            { text: "Twenty years from now you will be more disappointed by the things that you didn't do than by the ones you did do.", author: "H. Jackson Brown Jr." },
            { text: "One moment can change a day, one day can change a life and one life can change the world.", author: "Buddha" }
        ];

        // DOM Elements
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const currentIndexEl = document.getElementById('current-index');
        const totalQuotesEl = document.getElementById('total-quotes');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const randomBtn = document.getElementById('random-btn');
        const currentYearEl = document.getElementById('current-year');

        // Set current year in footer
        currentYearEl.textContent = new Date().getFullYear();

        // Set total quotes count
        totalQuotesEl.textContent = quotes.length;

        // Current quote index
        let currentIndex = 0;

        // Function to display a quote
        function displayQuote(index) {
            // Add fade out animation
            quoteText.classList.remove('fade-in');
            quoteText.classList.add('fade-out');
            quoteAuthor.classList.remove('fade-in');
            quoteAuthor.classList.add('fade-out');
            
            // Wait for animation to complete before changing text
            setTimeout(() => {
                quoteText.textContent = quotes[index].text;
                quoteAuthor.textContent = quotes[index].author;
                currentIndexEl.textContent = index + 1;
                
                // Add fade in animation
                quoteText.classList.remove('fade-out');
                quoteText.classList.add('fade-in');
                quoteAuthor.classList.remove('fade-out');
                quoteAuthor.classList.add('fade-in');
            }, 400);
        }

        // Function to get a random quote index
        function getRandomQuoteIndex() {
            return Math.floor(Math.random() * quotes.length);
        }

        // Event listeners
        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + quotes.length) % quotes.length;
            displayQuote(currentIndex);
        });

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % quotes.length;
            displayQuote(currentIndex);
        });

        randomBtn.addEventListener('click', () => {
            currentIndex = getRandomQuoteIndex();
            displayQuote(currentIndex);
        });

        // Initialize with a random quote
        window.addEventListener('load', () => {
            currentIndex = getRandomQuoteIndex();
            displayQuote(currentIndex);
        });
    </script>
</body>
</html>
